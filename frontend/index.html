<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>Odoo HRMS — Sign In</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .login-brand-row { display:flex; align-items:center; justify-content:center; margin-bottom:20px; }
    .login-brand-name { font-size:20px; font-weight:800; color:var(--primary); }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">

    <div class="login-brand-row">
      <img src="company logo/Screenshot 2026-07-04 112039.png" alt="Odoo HRMS" style="height:48px;width:auto;object-fit:contain"/>
    </div>

    <!-- Sign In -->
    <div id="loginView">
      <div class="login-title">Welcome back</div>
      <div class="login-sub">Sign in to your account to continue</div>
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label>Email Address</label>
          <input id="liEmail" class="form-control" type="email" placeholder="you@company.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="liPass" class="form-control" type="password" placeholder="••••••••" required/>
        </div>
        <div id="loginErr" class="login-err"></div>
        <button type="submit" class="btn btn-primary login-btn" id="loginBtn">Sign In</button>
      </form>
      <div class="login-switch">
        Don't have an account? <a href="#" id="toRegLink">Register here</a>
      </div>
    </div>

    <!-- Register -->
    <div id="regView" style="display:none">
      <div class="login-title">Create account</div>
      <div class="login-sub">Register to access the HRMS platform</div>
      <form id="regForm" autocomplete="off">
        <div class="form-group">
          <label>Full Name</label>
          <input id="reName" class="form-control" type="text" placeholder="Jane Doe" required/>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input id="reEmail" class="form-control" type="email" placeholder="you@company.com" required/>
        </div>
        <div class="form-group">
          <label>Password <span style="color:var(--text-sm);font-weight:400">(min 6 characters)</span></label>
          <input id="rePass" class="form-control" type="password" placeholder="••••••••" required/>
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="reRole" class="form-select">
            <option value="employee">Employee</option>
            <option value="hr">HR Officer</option>
            <option value="admin">Administrator</option>
          </select>
        </div>
        <div id="regErr" class="login-err"></div>
        <button type="submit" class="btn btn-primary login-btn" id="regBtn">Create Account</button>
      </form>
      <div class="login-switch">
        Already have an account? <a href="#" id="toLoginLink">Sign in</a>
      </div>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>
<script src="config.js?v=2"></script>
<script type="module">
import { Auth, post } from './api.js';

// Redirect if already logged in
if (Auth.token()) {
  window.location.href = Auth.isHR() ? 'dashboard.html' : 'employees.html';
}

// Ping backend to wake Railway before user clicks
fetch((window.HRMS_API_URL || 'http://localhost:3000/api').replace('/api', '/health')).catch(() => {});

// ── View toggle — use addEventListener, NOT onclick attributes ──
function showView(v) {
  document.getElementById('loginView').style.display = v === 'login' ? 'block' : 'none';
  document.getElementById('regView').style.display   = v === 'reg'   ? 'block' : 'none';
}

document.getElementById('toRegLink').addEventListener('click', e => { e.preventDefault(); showView('reg'); });
document.getElementById('toLoginLink').addEventListener('click', e => { e.preventDefault(); showView('login'); });

// ── Login ────────────────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  btn.textContent = 'Signing in…'; btn.disabled = true;
  try {
    const data = await post('/auth/login', {
      email:    document.getElementById('liEmail').value.trim(),
      password: document.getElementById('liPass').value,
    });
    if (!data || !data.token) throw new Error('Invalid server response — please try again.');
    Auth.set(data.token, data.user);
    window.location.href = data.user.role === 'employee' ? 'employees.html' : 'dashboard.html';
  } catch (ex) {
    err.textContent = ex.message; err.style.display = 'block';
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
});

// ── Register ─────────────────────────────────────────────────────
document.getElementById('regForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('regBtn');
  const err = document.getElementById('regErr');
  err.style.display = 'none';
  btn.textContent = 'Creating…'; btn.disabled = true;
  try {
    const data = await post('/auth/register', {
      name:     document.getElementById('reName').value.trim(),
      email:    document.getElementById('reEmail').value.trim(),
      password: document.getElementById('rePass').value,
      role:     document.getElementById('reRole').value,
    });
    if (!data || !data.token) throw new Error('Invalid server response — please try again.');
    Auth.set(data.token, data.user);
    window.location.href = data.user.role === 'employee' ? 'employees.html' : 'dashboard.html';
  } catch (ex) {
    err.textContent = ex.message; err.style.display = 'block';
    btn.textContent = 'Create Account'; btn.disabled = false;
  }
});
</script>
</body>
</html>
