<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enterprise HRMS — Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">🏢</div>
    <div class="login-title">Enterprise HRMS</div>
    <div class="login-sub">Every workday, perfectly aligned.</div>

    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input id="email" class="form-control" type="email" placeholder="you@company.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="password" class="form-control" type="password" placeholder="••••••••" required/>
      </div>
      <div class="form-group">
        <label>Login As</label>
        <select id="role" class="form-select">
          <option value="hr">HR / Admin</option>
          <option value="employee">Employee</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary login-btn">Sign In →</button>
      <div id="loginErr" class="login-err">Invalid email or password. Please try again.</div>
    </form>

    <div style="margin-top:20px; padding:14px; background:#f8f5ff; border-radius:10px; font-size:12px; color:#7F8C8D;">
      <strong>Demo accounts (any password works):</strong><br/>
      HR: <code>sarah.jenkins@hrms.demo</code><br/>
      Employee: <code>michael.chen@hrms.demo</code>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  // Already logged in? redirect
  if (HRMS.getUser()) window.location.href = 'dashboard.html';

  function doLogin(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const role     = document.getElementById('role').value;
    const ok = HRMS.login(email, password, role);
    if (ok) {
      window.location.href = role === 'employee' ? 'employees.html' : 'dashboard.html';
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }
</script>
</body>
</html>
