<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Employees — Enterprise HRMS</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="page-content">

      <div class="page-header">
        <div>
          <p style="font-size:12px;font-weight:600;color:var(--text-sm);margin-bottom:2px">Employees</p>
          <h1>Manage and view organizational hierarchy</h1>
        </div>
        <div class="page-header-actions" id="hrActions"></div>
      </div>

      <div class="toolbar">
        <input class="form-control" id="searchInput" placeholder="Search employees, departments…"
               oninput="filterCards()" style="max-width:280px"/>
        <select class="form-select" id="deptFilter" onchange="filterCards()" style="max-width:200px">
          <option value="">All Departments</option>
        </select>
        <select class="form-select" id="statusFilter" onchange="filterCards()" style="max-width:160px">
          <option value="">All Status</option>
          <option value="present">Present</option>
          <option value="absent">Absent</option>
          <option value="on_leave">On Leave</option>
          <option value="half_day">Half-Day</option>
        </select>
      </div>

      <div class="emp-kanban" id="empGrid">
        <div class="loading-row" style="width:100%;grid-column:1/-1">Loading employees…</div>
      </div>

    </div>
  </div>
</div>

<!-- Add Employee Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add New Employee</div>
      <button class="modal-close" onclick="closeModal('addModal')">×</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px">
      <div class="form-group" style="grid-column:1/-1"><label>Full Name *</label><input id="nName" class="form-control" placeholder="Jane Doe"/></div>
      <div class="form-group" style="grid-column:1/-1"><label>Email *</label><input id="nEmail" class="form-control" type="email" placeholder="jane@company.com"/></div>
      <div class="form-group" style="grid-column:1/-1"><label>Password *</label><input id="nPass" class="form-control" type="password" placeholder="Minimum 6 characters"/></div>
      <div class="form-group"><label>Job Title</label><input id="nJob" class="form-control" placeholder="Software Engineer"/></div>
      <div class="form-group"><label>Department</label><input id="nDept" class="form-control" placeholder="Engineering"/></div>
      <div class="form-group"><label>Phone</label><input id="nPhone" class="form-control" placeholder="+1-555-0000"/></div>
      <div class="form-group"><label>Role</label>
        <select id="nRole" class="form-select">
          <option value="employee">Employee</option>
          <option value="hr">HR Officer</option>
          <option value="admin">Administrator</option>
        </select>
      </div>
      <div class="form-group"><label>Basic Salary</label><input id="nSalary" class="form-control" type="number" min="0" placeholder="50000"/></div>
      <div class="form-group"><label>Date Joined</label><input id="nJoined" class="form-control" type="date"/></div>
    </div>
    <div id="addErr" class="form-err"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" id="saveEmpBtn" onclick="saveEmployee()">Save Employee</button>
    </div>
  </div>
</div>

<!-- View Employee Modal -->
<div class="modal-overlay" id="viewModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Employee Profile</div>
      <button class="modal-close" onclick="closeModal('viewModal')">×</button>
    </div>
    <div id="viewContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<style>
  .profile-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border-lt);font-size:13.5px}
  .profile-row:last-child{border-bottom:none}
  .profile-label{color:var(--text-sm);font-weight:500;min-width:110px}
</style>
<script type="module">
import { Auth, get, post, badge, avatar, statusDot, initials, toast, icons, renderSidebar, renderTopbar } from './api.js';

Auth.requireLogin();
document.getElementById('sidebar').innerHTML = renderSidebar('employees');
document.getElementById('topbar').innerHTML  = renderTopbar();

const isHR = Auth.isHR();
let allEmps = [];

if (isHR) {
  document.getElementById('hrActions').innerHTML = `
    <button class="btn btn-outline" onclick="openModal('addModal')">${icons.filter} Filter</button>
    <button class="btn btn-primary" onclick="openModal('addModal')">${icons.plus} Add Employee</button>`;
}

async function loadEmployees() {
  try {
    allEmps = await get('/employees');
    const depts = [...new Set(allEmps.map(e => e.dept).filter(Boolean))].sort();
    const sel = document.getElementById('deptFilter');
    sel.innerHTML = '<option value="">All Departments</option>' +
      depts.map(d => `<option value="${d}">${d}</option>`).join('');
    renderCards(allEmps);
  } catch(e) { toast('Failed to load employees', 'danger'); }
}

function renderCards(emps) {
  if (!emps.length) {
    document.getElementById('empGrid').innerHTML =
      `<div class="loading-row" style="width:100%;grid-column:1/-1">No employees found.</div>`;
    return;
  }
  document.getElementById('empGrid').innerHTML = emps.map(e => `
    <div class="emp-card" onclick="viewEmployee(${e.id})">
      <div class="emp-card-top">
        <div class="emp-photo" style="background:${e.color||'#5B2D8E'}">${initials(e.name)}</div>
        ${statusDot(e.status || 'absent')}
      </div>
      <div class="emp-card-name">${e.name}</div>
      <div class="emp-card-job">${e.job || '—'}</div>
      <div class="emp-card-dept">${e.dept || '—'}</div>
      <div class="emp-card-footer">
        <div>
          <div class="emp-meta-label">Employee ID</div>
          <div class="emp-meta-val">${e.code}</div>
        </div>
        <div style="text-align:right">
          <div class="emp-meta-label">Joined</div>
          <div class="emp-meta-val">${e.joined ? new Date(e.joined).toLocaleDateString('en-US',{month:'short',day:'2-digit',year:'numeric'}) : '—'}</div>
        </div>
      </div>
    </div>`).join('');
}

window.filterCards = () => {
  const s  = document.getElementById('searchInput').value.toLowerCase();
  const d  = document.getElementById('deptFilter').value;
  const st = document.getElementById('statusFilter').value;
  renderCards(allEmps.filter(e =>
    (!s  || e.name.toLowerCase().includes(s) || (e.dept||'').toLowerCase().includes(s) || (e.job||'').toLowerCase().includes(s)) &&
    (!d  || e.dept === d) &&
    (!st || e.status === st)
  ));
};

window.onGlobalSearch = v => { document.getElementById('searchInput').value = v; filterCards(); };

window.viewEmployee = async (id) => {
  try {
    const e = await get('/employees/' + id);
    document.getElementById('viewContent').innerHTML = `
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)">
        <div class="emp-photo" style="background:${e.color||'#5B2D8E'};width:64px;height:64px;font-size:22px">${initials(e.name)}</div>
        <div>
          <div style="font-size:20px;font-weight:800">${e.name}</div>
          <div style="color:var(--text-sm);font-size:13px;margin-top:2px">${e.job || '—'}</div>
          <div style="color:var(--primary);font-size:13px;font-weight:600;margin-top:3px">${e.dept || '—'}</div>
        </div>
      </div>
      <div class="profile-row"><span class="profile-label">Employee ID</span><strong>${e.code}</strong></div>
      <div class="profile-row"><span class="profile-label">Email</span>${e.email}</div>
      <div class="profile-row"><span class="profile-label">Phone</span>${e.phone || '—'}</div>
      <div class="profile-row"><span class="profile-label">Status</span>${badge(e.status)}</div>
      <div class="profile-row"><span class="profile-label">Role</span>${badge(e.role)}</div>
      <div class="profile-row"><span class="profile-label">Date Joined</span>${e.joined || '—'}</div>
      ${isHR ? `<div class="profile-row"><span class="profile-label">Basic Salary</span><strong>$${(e.salary||0).toLocaleString()}</strong></div>` : ''}`;
    openModal('viewModal');
  } catch(ex) { toast(ex.message, 'danger'); }
};

window.saveEmployee = async () => {
  const btn = document.getElementById('saveEmpBtn');
  const err = document.getElementById('addErr');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    await post('/employees', {
      name:    document.getElementById('nName').value.trim(),
      email:   document.getElementById('nEmail').value.trim(),
      password:document.getElementById('nPass').value,
      job:     document.getElementById('nJob').value.trim(),
      dept:    document.getElementById('nDept').value.trim(),
      phone:   document.getElementById('nPhone').value.trim(),
      role:    document.getElementById('nRole').value,
      salary:  parseFloat(document.getElementById('nSalary').value)||0,
      joined:  document.getElementById('nJoined').value,
    });
    closeModal('addModal');
    toast('Employee added successfully');
    loadEmployees();
  } catch(ex) { err.textContent = ex.message; err.style.display = 'block'; }
  finally { btn.disabled = false; btn.textContent = 'Save Employee'; }
};

window.openModal  = id => document.getElementById(id).classList.add('open');
window.closeModal = id => document.getElementById(id).classList.remove('open');

loadEmployees();
</script>
</body>
</html>
