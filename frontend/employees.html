<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Employees — Enterprise HRMS</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="page-content">

      <div class="page-header">
        <div class="page-header-left">
          <h1>Employees</h1>
          <p>Manage and view organizational hierarchy</p>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-outline" onclick="openFilter()">⚙ Filter</button>
          <button class="btn btn-primary" onclick="openAddModal()">👤 Add Employee</button>
        </div>
      </div>

      <div class="toolbar">
        <input type="text" class="form-control" id="searchInput" placeholder="Search employees, departments..." oninput="renderCards()" style="max-width:280px"/>
        <select class="form-select" id="deptFilter" onchange="renderCards()" style="max-width:200px">
          <option value="">All Departments</option>
        </select>
        <select class="form-select" id="statusFilter" onchange="renderCards()" style="max-width:160px">
          <option value="">All Status</option>
          <option value="present">Present</option>
          <option value="absent">Absent</option>
          <option value="on_leave">On Leave</option>
          <option value="half_day">Half-Day</option>
        </select>
      </div>

      <div class="emp-kanban" id="empGrid"></div>
    </div>
  </div>
</div>

<!-- Add Employee Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add New Employee</div>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="form-group"><label>Full Name *</label><input id="newName" class="form-control" placeholder="John Doe"/></div>
    <div class="form-group"><label>Email *</label><input id="newEmail" class="form-control" type="email" placeholder="john@company.com"/></div>
    <div class="form-group"><label>Job Title</label><input id="newJob" class="form-control" placeholder="Software Engineer"/></div>
    <div class="form-group"><label>Department</label><input id="newDept" class="form-control" placeholder="Engineering"/></div>
    <div class="form-group"><label>Phone</label><input id="newPhone" class="form-control" placeholder="+1-555-0000"/></div>
    <div class="form-group">
      <label>Role</label>
      <select id="newRole" class="form-select">
        <option value="employee">Employee</option>
        <option value="hr">HR Officer</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="form-group"><label>Basic Salary</label><input id="newSalary" class="form-control" type="number" placeholder="50000"/></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEmployee()">Save Employee</button>
    </div>
  </div>
</div>

<!-- View Employee Modal -->
<div class="modal-overlay" id="viewModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Employee Profile</div>
      <button class="modal-close" onclick="closeModal('viewModal')">✕</button>
    </div>
    <div id="viewContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
<script>
HRMS.requireLogin();
document.getElementById('sidebar').innerHTML = HRMS.renderSidebar('employees');
document.getElementById('topbar').innerHTML  = HRMS.renderTopbar();

// populate dept filter
const depts = [...new Set(HRMS.getEmployees().map(e => e.dept))];
const deptSel = document.getElementById('deptFilter');
depts.forEach(d => { const o = document.createElement('option'); o.value=d; o.textContent=d; deptSel.appendChild(o); });

function renderCards() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const dept   = document.getElementById('deptFilter').value;
  const status = document.getElementById('statusFilter').value;
  let emps = HRMS.getEmployees().filter(e => {
    if (search && !e.name.toLowerCase().includes(search) && !e.dept.toLowerCase().includes(search) && !e.job.toLowerCase().includes(search)) return false;
    if (dept   && e.dept   !== dept)   return false;
    if (status && e.status !== status) return false;
    return true;
  });

  document.getElementById('empGrid').innerHTML = emps.map(e => `
    <div class="emp-card" onclick="viewEmployee(${e.id})">
      <div class="emp-card-top">
        <div>
          <div class="emp-photo" style="background:${e.color}">${HRMS.initials(e.name)}</div>
        </div>
        <div>${HRMS.badgeHtml(e.status)}</div>
      </div>
      <div class="emp-card-name">${e.name}</div>
      <div class="emp-card-job">${e.job}</div>
      <div class="emp-card-dept">${e.dept}</div>
      <div class="emp-card-footer">
        <div><div class="emp-meta-label">Employee ID</div><div class="emp-meta-val">${e.code}</div></div>
        <div style="text-align:right"><div class="emp-meta-label">Joined</div><div class="emp-meta-val">${e.joined}</div></div>
      </div>
    </div>
  `).join('') || '<div style="padding:40px;color:var(--text-sm);text-align:center;width:100%">No employees found.</div>';
}

function viewEmployee(id) {
  const e = HRMS.getEmployee(id);
  const user = HRMS.getUser();
  const isHR = user && (user.roleKey === 'hr' || user.roleKey === 'admin');
  document.getElementById('viewContent').innerHTML = `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      <div class="emp-photo" style="background:${e.color};width:64px;height:64px;font-size:22px">${HRMS.initials(e.name)}</div>
      <div>
        <div style="font-size:20px;font-weight:800">${e.name}</div>
        <div style="color:var(--text-sm)">${e.job}</div>
        <div style="color:var(--primary);font-size:13px;font-weight:600">${e.dept}</div>
      </div>
    </div>
    <table style="width:100%;font-size:14px">
      <tr><td style="padding:6px 0;color:var(--text-sm);width:40%">Employee ID</td><td><strong>${e.code}</strong></td></tr>
      <tr><td style="padding:6px 0;color:var(--text-sm)">Email</td><td>${e.email}</td></tr>
      <tr><td style="padding:6px 0;color:var(--text-sm)">Phone</td><td>${e.phone}</td></tr>
      <tr><td style="padding:6px 0;color:var(--text-sm)">Status</td><td>${HRMS.badgeHtml(e.status)}</td></tr>
      <tr><td style="padding:6px 0;color:var(--text-sm)">Role</td><td>${e.role}</td></tr>
      <tr><td style="padding:6px 0;color:var(--text-sm)">Date Joined</td><td>${e.joined}</td></tr>
      ${isHR ? `<tr><td style="padding:6px 0;color:var(--text-sm)">Salary</td><td><strong>$${e.salary.toLocaleString()}</strong></td></tr>` : ''}
    </table>`;
  openModal('viewModal');
}

function openAddModal()  { openModal('addModal'); }
function openFilter()    { HRMS.toast('Use the search and filter dropdowns above', 'success'); }
function openModal(id)   { document.getElementById(id).classList.add('open'); }
function closeModal(id)  { document.getElementById(id).classList.remove('open'); }

function saveEmployee() {
  const name = document.getElementById('newName').value.trim();
  const email= document.getElementById('newEmail').value.trim();
  if (!name || !email) { HRMS.toast('Name and email are required', 'danger'); return; }
  HRMS.addEmployee({
    name, email,
    job:    document.getElementById('newJob').value,
    dept:   document.getElementById('newDept').value,
    phone:  document.getElementById('newPhone').value,
    role:   document.getElementById('newRole').value,
    salary: parseFloat(document.getElementById('newSalary').value) || 0,
    status: 'absent',
    joined: new Date().toLocaleDateString('en-US',{month:'short',day:'2-digit',year:'numeric'}),
  });
  closeModal('addModal');
  HRMS.toast('Employee added successfully ✓');
  renderCards();
}

renderCards();
</script>
</body>
</html>
